<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Shellular — Scan QR</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #viewfinder {
      position: relative;
      width: 100vw;
      height: 100dvh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Corner bracket overlay */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .bracket {
      position: relative;
      width: min(72vw, 72vh);
      height: min(72vw, 72vh);
    }

    .bracket::before,
    .bracket::after,
    .bracket>span::before,
    .bracket>span::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #fff;
      border-style: solid;
      opacity: 0.9;
    }

    .bracket::before {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
    }

    .bracket::after {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
    }

    .bracket>span::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
    }

    .bracket>span::after {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
    }

    /* Scan line animation */
    .scanline {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4f8ef7, transparent);
      animation: scan 2s ease-in-out infinite;
    }

    @keyframes scan {
      0% {
        top: 4px;
        opacity: 1;
      }

      50% {
        opacity: 1;
      }

      100% {
        top: calc(100% - 6px);
        opacity: 0.5;
      }
    }

    #hint {
      position: absolute;
      bottom: max(32px, env(safe-area-inset-bottom, 32px));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.02em;
    }

    /* States */
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0d0d0d;
      text-align: center;
      padding: 32px;
    }

    #status.hidden {
      display: none;
    }

    #status svg {
      opacity: 0.5;
    }

    #status p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      max-width: 280px;
      line-height: 1.5;
    }

    #status button {
      margin-top: 8px;
      padding: 10px 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    #status.success svg {
      opacity: 1;
    }

    #status.success p {
      color: #4ade80;
      font-size: 16px;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div id="status">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
    <p id="status-msg">Starting camera…</p>
  </div>

  <div id="viewfinder" class="hidden" style="display:none">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay">
      <div class="bracket">
        <span></span>
        <div class="scanline"></div>
      </div>
    </div>
    <div id="hint">Point at the QR code shown by the CLI</div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusMsg = document.getElementById('status-msg');
    const viewfinder = document.getElementById('viewfinder');
    const video = document.getElementById('video');

    function showError(msg, retryable) {
      statusMsg.textContent = msg;
      if (retryable) {
        const btn = document.createElement('button');
        btn.textContent = 'Try again';
        btn.onclick = () => { btn.remove(); start(); };
        statusEl.appendChild(btn);
      }
    }

    async function start() {
      // Camera access
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false,
        });
      } catch (e) {
        showError('Camera access was denied. Please allow camera permission and try again.', true);
        return;
      }

      // BarcodeDetector check
      if (!('BarcodeDetector' in window)) {
        showError('Your browser does not support barcode detection. Please update Chrome.', false);
        stream.getTracks().forEach(t => t.stop());
        return;
      }

      const detector = new BarcodeDetector({ formats: ['qr_code'] });

      video.srcObject = stream;
      statusEl.classList.add('hidden');
      viewfinder.style.display = 'block';

      let done = false;

      async function tick() {
        if (done) return;
        try {
          const results = await detector.detect(video);
          if (results.length) {
            const raw = results[0].rawValue;
            window.location.href = `acode://shellular/connect/${encodeURIComponent(raw)}`;
            done = true;
          }
        } catch (_) { /* frame not ready yet */ }
        requestAnimationFrame(tick);
      }

      video.addEventListener('loadedmetadata', () => requestAnimationFrame(tick), { once: true });
    }

    start();
  </script>
</body>

</html>
