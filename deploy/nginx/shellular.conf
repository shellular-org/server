# Reverse-proxy + TLS termination for a Shellular server box (central or a relay).
#
# The upstream is the Node process on this host; nginx terminates TLS and upgrades
# WebSocket connections through to it. Both the CLI (`/cli`) and app (`/app`) relay
# upgrades, plus the relay↔central control socket (`/relay`), ride the same
# `location /` block below — the Upgrade/Connection headers + HTTP/1.1 are what make
# WebSockets work through the proxy.
#
# Per-server substitutions:
#   - server_name            → this server's hostname
#   - ssl_certificate paths  → its Let's Encrypt live dir
#   - proxy_pass port        → the Node port this server runs on:
#                                central defaults to 6969 (CENTRAL_PORT)
#                                relay   defaults to 6970 (RELAY_PORT)
# Note: port below is a per-process override — set to match (change from 6970 if needed)
# Also change the `server_name` 

server {
    listen 80;
    listen [::]:80;
    server_name domain.shellular.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # for nginx version 1.28.3+, remove http2 from above, and uncomment the line below to enable HTTP/2.
    # http2 on;

    server_name domain.shellular.dev;

    ssl_certificate /etc/letsencrypt/live/domain.shellular.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain.shellular.dev/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:6970;

        # WebSocket upgrades require HTTP/1.1 (the default 1.0 can't upgrade).
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support: pass the Upgrade/Connection handshake headers through.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-lived relay sockets: don't let nginx reap an otherwise-healthy
        # connection on its 60s default idle timeout. These are IDLE timeouts —
        # every WebSocket ping/pong frame resets them — and every socket crossing
        # this proxy is pinged at least every 30s (relay keepalive on /app + /cli
        # and the central↔relay presence channel; the CLI also pings ~25s). 180s is
        # ~6x that gap: healthy sockets never hit it, and a socket that has gone
        # truly silent (keepalive stopped) is dead and should be reaped anyway.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
